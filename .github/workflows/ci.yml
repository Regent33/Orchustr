name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [1.87.0]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy,rustfmt
      - uses: taiki-e/install-action@cargo-nextest
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@cargo-deny
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo deny check
      - run: cargo nextest run --all-features
      - run: cargo run -p or-cli -- lint docs/examples/
      - run: cargo test -p or-lens --features dashboard
      - run: cargo llvm-cov --all-features --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: true

  bindings-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.87.0"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14.4"
      - run: pip install maturin pytest
      - run: cd bindings/python && pip install -e .
      - run: cd bindings/python && pytest tests/ -v

  bindings-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd bindings/typescript && npm ci
      - run: cd bindings/typescript && npm run typecheck
      - run: cd bindings/typescript && npm test

  bindings-dart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.87.0"
      - uses: dart-lang/setup-dart@v1
      - run: cd bindings/dart && dart pub get
      - run: cd bindings/dart && dart format --output=none --set-exit-if-changed .
      - run: cd bindings/dart && dart analyze
      - run: cd bindings/dart && dart run tool/build_native.dart
      - run: cd bindings/dart && dart test
